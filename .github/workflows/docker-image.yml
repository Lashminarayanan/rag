name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./offline-financial-rag-mvp/backend-enterprise
          file: ./offline-financial-rag-mvp/backend-enterprise/Dockerfile
          push: true
          tags: ghcr.io/bkls/financial-rag-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./offline-financial-rag-mvp/frontend-react
          file: ./offline-financial-rag-mvp/frontend-react/Dockerfile
          push: true
          tags: ghcr.io/bkls/financial-rag-frontend:latest

      - name: Build & push embeddings
        uses: docker/build-push-action@v5
        with:
          context: ./offline-financial-rag-mvp/rag
          file: ./offline-financial-rag-mvp/rag/Dockerfile.embeddings
          push: true
          tags: ghcr.io/bkls/financial-rag-embeddings:latest

      - name: Build & push ingest
        uses: docker/build-push-action@v5
        with:
          context: ./offline-financial-rag-mvp/rag
          file: ./offline-financial-rag-mvp/rag/Dockerfile
          push: true
          tags: ghcr.io/bkls/financial-rag-ingest:latest
